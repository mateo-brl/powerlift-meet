appId: com.mateobrl.powerliftmeet
productName: powerlift-meet
copyright: © Mateo Baril — GPL-3.0
# Version figée : evite la détection d'Electron via node_modules (hoisté en monorepo).
electronVersion: 33.4.11
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**/*
  - '!**/*.map'
# Les paquets du monorepo sont déjà compilés et bundlés dans dist-electron.
extraMetadata:
  main: dist-electron/main/index.js
npmRebuild: false
# Nom d'artefact basé sur productName (jamais sur le nom de paquet) pour des fichiers propres.
artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}
portable:
  artifactName: ${productName}-${version}-portable.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: Mateo Baril
  executableName: powerlift-meet
  artifactName: ${productName}-${version}.${ext}
